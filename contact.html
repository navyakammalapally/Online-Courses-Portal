<!-- HEADER -->
<section class="text-center py-5 bg-light">
<div class="container">
<h1>Contact Us</h1>
<p class="lead">We are here to help you anytime</p>
</div>
</section>

<!-- ALERT -->
<div class="container mt-3">
<div class="alert alert-info text-center">
For any queries related to courses, registration, or support — feel free to contact us.
</div>
</div>

<!-- CONTACT FORM -->
<section class="container py-5">

<div class="row justify-content-center">

<div class="col-12 col-md-8 col-lg-6">

<form class="shadow p-4 bg-white rounded">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label class="form-label">Subject</label>
<input type="text" class="form-control" placeholder="Enter subject">
</div>

<div class="mb-3">
<label class="form-label">Message</label>
<textarea class="form-control" rows="5" placeholder="Write your message" required></textarea>
</div>

<div class="d-grid gap-2">
<button type="submit" class="btn btn-primary">Send Message</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>

</form>

</div>

</div>

</section>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3">
<p class="mb-1">© 2026 Tiffany's Online Course Portal</p>
<p class="mb-0">Facebook | Instagram | LinkedIn</p>
</footer>
