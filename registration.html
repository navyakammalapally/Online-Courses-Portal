<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
<div class="container">
<a class="navbar-brand" href="index.html">Course Portal</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>

</ul>
</div>
</div>
</nav>

<div class="container py-5">

<h2 class="text-center mb-4">Student Registration</h2>

<form class="shadow p-4 bg-white rounded">

<div class="row">

<div class="col-md-6 mb-3">
<input type="text" class="form-control" placeholder="Student Name" required>
</div>

<div class="col-md-6 mb-3">
<input type="email" class="form-control" placeholder="Email" required>
</div>

<div class="col-md-6 mb-3">
<input type="tel" class="form-control" placeholder="Mobile Number" required>
</div>

<div class="col-md-6 mb-3">
<select class="form-select">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<select class="form-select">
<option>Select Course</option>
<option>Web Development</option>
<option>Python</option>
<option>Data Science</option>
<option>AIML</option>
<option>Cloud Computing</option>
<option>Java</option>
</select>
</div>

<div class="col-md-6 mb-3">
<input type="text" class="form-control" placeholder="Qualification">
</div>

<div class="col-12 mb-3">
<textarea class="form-control" placeholder="Address"></textarea>
</div>

<div class="col-12 mb-3">
<input type="file" class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label>I agree to terms</label>
</div>

</div>

<button class="btn btn-primary">Submit</button>

</form>

</div>

</body>
</html>
